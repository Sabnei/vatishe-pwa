{% extends "base.html" %}
{# Layout del Inquilino: top bar + barra de navegación inferior de 4 pestañas. #}

{% block navegacion_inferior %}
<nav class="sticky bottom-0 z-40 bg-surface-lowest border-t border-outline-variant flex justify-around items-center h-20 px-2">
  {% with a=nav_activo %}
  <a href="{% url 'core:inicio' %}"
     class="flex flex-col items-center gap-1 min-w-[64px] py-1 {% if a == 'inicio' %}text-accent{% else %}text-ink-variant hover:text-primary{% endif %}">
    <span class="material-symbols-outlined" {% if a == 'inicio' %}style="font-variation-settings: 'FILL' 1;"{% endif %}>home</span>
    <span class="text-[10px] font-bold uppercase tracking-wide">Inicio</span>
  </a>
  <a href="{% url 'pagos:mis_cobros' %}"
     class="flex flex-col items-center gap-1 min-w-[64px] py-1 {% if a == 'abonos' %}text-accent{% else %}text-ink-variant hover:text-primary{% endif %}">
    <span class="material-symbols-outlined" {% if a == 'abonos' %}style="font-variation-settings: 'FILL' 1;"{% endif %}>account_balance_wallet</span>
    <span class="text-[10px] font-bold uppercase tracking-wide">Abonos</span>
  </a>
  <a href="{% url 'pagos:historial' %}"
     class="flex flex-col items-center gap-1 min-w-[64px] py-1 {% if a == 'historial' %}text-accent{% else %}text-ink-variant hover:text-primary{% endif %}">
    <span class="material-symbols-outlined" {% if a == 'historial' %}style="font-variation-settings: 'FILL' 1;"{% endif %}>history</span>
    <span class="text-[10px] font-bold uppercase tracking-wide">Historial</span>
  </a>
  <a href="{% url 'cuentas:mi_perfil' %}"
     class="flex flex-col items-center gap-1 min-w-[64px] py-1 {% if a == 'perfil' %}text-accent{% else %}text-ink-variant hover:text-primary{% endif %}">
    <span class="material-symbols-outlined" {% if a == 'perfil' %}style="font-variation-settings: 'FILL' 1;"{% endif %}>person</span>
    <span class="text-[10px] font-bold uppercase tracking-wide">Perfil</span>
  </a>
  {% endwith %}
</nav>
{% endblock %}
